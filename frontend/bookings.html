<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khách Sạn Hotel Haven - Đặt Phòng</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
        }
        .sidebar {
            transition: all 0.3s ease;
            background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 100%);
        }
        .sidebar-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item:hover {
            background-color: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        .booking-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 4px solid transparent;
        }
        .booking-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-left-color: #4f46e5;
        }
        .booking-card.active {
            border-left-color: #4f46e5;
            background-color: #f0f4ff;
        }
        .stage-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .stage-1 { background-color: #fef3c7; color: #d97706; }
        .stage-2 { background-color: #dbeafe; color: #1e40af; }
        .stage-3 { background-color: #e9d5ff; color: #7e22ce; }
        .stage-4 { background-color: #fecaca; color: #991b1b; }
        .stage-5 { background-color: #fcd34d; color: #92400e; }
        .stage-6 { background-color: #d1fae5; color: #059669; }
        .search-input {
            transition: all 0.3s ease;
        }
        .search-input:focus {
            transform: scale(1.02);
        }
        .filter-button {
            transition: all 0.3s ease;
        }
        .filter-button.active {
            background-color: #4f46e5;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Top Navigation -->
            <header class="bg-white shadow-sm p-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">Tất Cả Đặt Phòng</h2>
                <div class="flex items-center space-x-4">
                    <button onclick="createNewBooking()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2 transition-all duration-300 transform hover:scale-105">
                        <i data-feather="plus" class="w-4 h-4"></i>
                        <span>Đặt Phòng Mới</span>
                    </button>
                    <div class="relative">
                        <i data-feather="bell" class="text-gray-500 hover:text-indigo-600 cursor-pointer transition"></i>
                        <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-white text-xs flex items-center justify-center">5</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                            <i data-feather="user" class="text-indigo-600"></i>
                        </div>
                        <span class="text-sm font-medium">Quản Trị</span>
                    </div>
                </div>
            </header>

            <!-- Bookings Content -->
            <main class="p-6">
                <!-- Filters and Search -->
                <div class="bg-white rounded-xl shadow-md p-4 mb-6">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                        <div class="flex-1 relative">
                            <input type="text" id="searchInput" placeholder="Tìm kiếm theo ID, tên khách, hoặc email..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 search-input transition-all">
                            <i data-feather="search" class="absolute left-3 top-2.5 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- Filter by Stage -->
                    <div class="mt-4">
                        <p class="text-sm font-semibold text-gray-700 mb-2">Lọc theo giai đoạn:</p>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="filterByStage('all')" class="filter-button active px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium transition-all">Tất Cả</button>
                            <button onclick="filterByStage(1)" class="filter-button px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium transition-all">Giai Đoạn 1</button>
                            <button onclick="filterByStage(2)" class="filter-button px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium transition-all">Giai Đoạn 2</button>
                            <button onclick="filterByStage(3)" class="filter-button px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium transition-all">Giai Đoạn 3</button>
                            <button onclick="filterByStage(4)" class="filter-button px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium transition-all">Giai Đoạn 4</button>
                            <button onclick="filterByStage(5)" class="filter-button px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium transition-all">Giai Đoạn 5</button>
                            <button onclick="filterByStage(6)" class="filter-button px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium transition-all">Giai Đoạn 6</button>
                        </div>
                    </div>
                </div>

                <!-- Bookings List -->
                <div id="bookingsList" class="space-y-4">
                    <!-- Booking cards will be generated here -->
                </div>
            </main>
        </div>
    </div>

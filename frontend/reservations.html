<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khách Sạn Hotel Haven - Đặt Chỗ</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
        }
        .sidebar {
            transition: all 0.3s ease;
            background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 100%);
        }
        .sidebar-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item:hover {
            background-color: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        .reservation-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
        }
        .reservation-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-left-color: #4f46e5;
        }
        .status-pending {
            background-color: #fef3c7;
            color: #d97706;
        }
        .status-confirmed {
            background-color: #d1fae5;
            color: #059669;
        }
        .status-cancelled {
            background-color: #fee2e2;
            color: #dc2626;
        }
        .status-checkout {
            background-color: #e0e7ff;
            color: #4338ca;
        }
        .status-checkin {
            background-color: #dbeafe;
            color: #1e40af;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .accordion-content.active {
            max-height: 5000px;
            transition: max-height 0.5s ease-in;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .tab-button {
            transition: all 0.3s;
        }
        .tab-button.active {
            background-color: #4f46e5;
            color: white;
        }
        .room-card {
            border-left: 3px solid #6366f1;
            background: #f9fafb;
        }
        .guest-card {
            border-left: 2px solid #10b981;
            background: #f0fdf4;
        }
        .expand-icon {
            transition: transform 0.3s ease;
        }
        .expand-icon.rotated {
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="sidebar bg-indigo-800 text-white w-64 flex-shrink-0">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-logo">
                        <i data-feather="home"></i>
                    </div>
                    <h1 class="sidebar-title">Hotel Haven</h1>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="layout"></i>
                    <span>Trang Chủ</span>
                </a>
                <a href="guests.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="users"></i>
                    <span>Khách Hàng</span>
                </a>
                <a href="rooms.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="home"></i>
                    <span>Phòng</span>
                </a>
                <a href="bookings.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="calendar"></i>
                    <span>Đặt Phòng</span>
                </a>
                <a href="reservations.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg bg-indigo-700">
                    <i data-feather="clipboard"></i>
                    <span>Đặt Chỗ</span>
                </a>
                <a href="services.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="coffee"></i>
                    <span>Dịch Vụ</span>
                </a>
                <a href="bills.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="dollar-sign"></i>
                    <span>Hóa Đơn</span>
                </a>
                <a href="users.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="user-plus"></i>
                    <span>Người Dùng</span>
                </a>
                <a href="admin.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="shield"></i>
                    <span>Quản Trị</span>
                </a>
                <a href="settings.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="settings"></i>
                    <span>Cài Đặt</span>
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Top Navigation -->
            <header class="bg-white shadow-sm p-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">Đặt Chỗ</h2>
                <div class="flex items-center space-x-4">
                    <button id="new-reservation-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2 transition-all duration-300 transform hover:scale-105">
                        <i data-feather="plus" class="w-4 h-4"></i>
                        <span>Đặt Chỗ Mới</span>
                    </button>
                    <div class="relative">
                        <i data-feather="bell" class="text-gray-500 hover:text-indigo-600 cursor-pointer transition"></i>
                        <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-white text-xs flex items-center justify-center notification-badge">3</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                            <i data-feather="user" class="text-indigo-600"></i>
                        </div>
                        <span class="text-sm font-medium">Quản Trị</span>
                    </div>
                </div>
            </header>

            <!-- Reservations Content -->
            <main class="p-6">
                <!-- Search Section -->
                <div class="bg-white rounded-xl shadow-md overflow-hidden mb-6 p-4">
                    <div class="space-y-4">
                        <h3 class="text-lg font-medium text-gray-800">Tìm kiếm Reservations</h3>
                        
                        <!-- Search by Guest ID -->
                        <div class="flex flex-col md:flex-row md:items-center gap-4">
                            <label class="text-sm font-medium text-gray-700 w-32">Theo Guest ID:</label>
                            <div class="flex gap-2 flex-1">
                                <div class="relative flex-1 md:w-64">
                                    <input 
                                        type="number" 
                                        id="search-guest-id"
                                        placeholder="Nhập Guest ID..." 
                                        class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 w-full transition-all">
                                    <i data-feather="search" class="absolute left-3 top-2.5 text-gray-400 w-4 h-4"></i>
                                </div>
                                <button 
                                    id="search-btn"
                                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg flex items-center space-x-2 transition-all duration-300">
                                    <i data-feather="search" class="w-4 h-4"></i>
                                    <span>Tìm kiếm</span>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Search by Reservation ID -->
                        <div class="flex flex-col md:flex-row md:items-center gap-4 border-t pt-4">
                            <label class="text-sm font-medium text-gray-700 w-32">Theo Reservation ID:</label>
                            <div class="flex gap-2 flex-1">
                                <div class="relative flex-1 md:w-64">
                                    <input 
                                        type="text" 
                                        id="search-res-id"
                                        placeholder="Nhập Reservation ID..." 
                                        class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 w-full transition-all">
                                    <i data-feather="search" class="absolute left-3 top-2.5 text-gray-400 w-4 h-4"></i>
                                </div>
                                <button 
                                    id="search-res-btn"
                                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg flex items-center space-x-2 transition-all duration-300">
                                    <i data-feather="search" class="w-4 h-4"></i>
                                    <span>Xem chi tiết</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Reservations List with Hierarchical Structure -->
                <div id="reservations-container" class="space-y-4">
                    <!-- Content will be dynamically loaded here -->
                    <div class="bg-white rounded-xl shadow-md p-8 text-center text-gray-500">
                        <i data-feather="search" class="w-12 h-12 mx-auto mb-4 text-gray-400"></i>
                        <p>Vui lòng nhập Guest ID hoặc Reservation ID để tìm kiếm reservations</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/reservations.js"></script>
</body>
</html>

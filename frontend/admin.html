<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khách Sạn Hotel Haven - Quản Trị</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
        }
        .sidebar {
            transition: all 0.3s ease;
            background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 100%);
        }
        .sidebar-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item:hover {
            background-color: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="sidebar bg-indigo-800 text-white w-64 flex-shrink-0">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-logo">
                        <i data-feather="home"></i>
                    </div>
                    <h1 class="sidebar-title">Hotel Haven</h1>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="layout"></i>
                    <span>Trang Chủ</span>
                </a>
                <a href="guests.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="users"></i>
                    <span>Khách Hàng</span>
                </a>
                <a href="rooms.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="home"></i>
                    <span>Phòng</span>
                </a>
                <a href="bookings.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="calendar"></i>
                    <span>Đặt Phòng</span>
                </a>
                <a href="reservations.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="clipboard"></i>
                    <span>Đặt Chỗ</span>
                </a>
                <a href="services.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="coffee"></i>
                    <span>Dịch Vụ</span>
                </a>
                <a href="bills.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="dollar-sign"></i>
                    <span>Hóa Đơn</span>
                </a>
                <a href="users.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="user-plus"></i>
                    <span>Người Dùng</span>
                </a>
                <a href="admin.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg bg-indigo-700">
                    <i data-feather="shield"></i>
                    <span>Quản Trị</span>
                </a>
                <a href="settings.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg">
                    <i data-feather="settings"></i>
                    <span>Cài Đặt</span>
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Top Navigation -->
            <header class="bg-white shadow-sm p-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">Quản Trị Nhân Viên</h2>
                <div class="flex items-center space-x-4">
                    <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2 transition-all duration-300 transform hover:scale-105">
                        <i data-feather="user-plus" class="w-4 h-4"></i>
                        <span>Thêm Nhân Viên</span>
                    </button>
                    <div class="relative">
                        <i data-feather="bell" class="w-5 h-5 text-gray-500 cursor-pointer"></i>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center">
                            <i data-feather="user" class="w-4 h-4 text-white"></i>
                        </div>
                        <span class="user-name text-sm font-medium text-gray-700">Admin</span>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="p-6">
                <!-- Stats Grid -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="bg-white rounded-lg shadow-sm p-6 hover:shadow-md transition-shadow">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-600 mb-1">Tổng Nhân Viên</p>
                                <h3 class="text-3xl font-bold text-gray-800">0</h3>
                            </div>
                            <div class="w-12 h-12 bg-indigo-100 rounded-lg flex items-center justify-center">
                                <i data-feather="users" class="w-6 h-6 text-indigo-600"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm p-6 hover:shadow-md transition-shadow">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-600 mb-1">Quản Lý</p>
                                <h3 class="text-3xl font-bold text-gray-800">0</h3>
                            </div>
                            <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
                                <i data-feather="shield" class="w-6 h-6 text-purple-600"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm p-6 hover:shadow-md transition-shadow">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-600 mb-1">Nhân Viên</p>
                                <h3 class="text-3xl font-bold text-gray-800">0</h3>
                            </div>
                            <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                                <i data-feather="user" class="w-6 h-6 text-green-600"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Employee Table -->
                <div class="bg-white rounded-lg shadow-sm">
                    <div class="p-6 border-b border-gray-200">
                        <div class="flex justify-between items-center">
                            <h3 class="text-lg font-semibold text-gray-800">Danh Sách Nhân Viên</h3>
                            <div class="flex items-center space-x-2 bg-gray-50 rounded-lg px-4 py-2 border border-gray-200">
                                <i data-feather="search" class="w-4 h-4 text-gray-400"></i>
                                <input type="text" placeholder="Tìm kiếm nhân viên..." class="search-input bg-transparent border-0 focus:ring-0 text-sm">
                            </div>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nhân viên</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Vai trò</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Trạng thái</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr>
                                    <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                                        Đang tải dữ liệu...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>

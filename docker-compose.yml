version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: hotel_db
    restart: always
    environment:
      MYSQL_DATABASE: hotel_reservation_premium
      MYSQL_ROOT_PASSWORD: An_cat_m0i
    ports:
      - "3306:3306"
    command: --lower-case-table-names=1
    volumes:
      - ./sql/perfectData.sql:/docker-entrypoint-initdb.d/perfectData.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pAn_cat_m0i"]
      timeout: 10s
      retries: 5

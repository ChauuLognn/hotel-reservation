version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hotel-mysql
    restart: always
    environment:
      MYSQL_DATABASE: hotel_reservation_premium
      MYSQL_ROOT_PASSWORD: "1011"
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel-backend
    restart: always
    depends_on:
      - mysql
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:mysql://mysql:3306/hotel_reservation_premium?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok&zeroDateTimeBehavior=convertToNull
      - DB_USERNAME=root
      - DB_PASSWORD=1011
      - JWT_SECRET=hotel_reservation_secret_key_2024_very_long_and_secure_at_least_256_bits_for_hs256_algorithm
      - JWT_EXPIRATION=86400000
      - CORS_ALLOWED_ORIGINS=*
      - SYSTEM_USER_ID=9
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotel-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:

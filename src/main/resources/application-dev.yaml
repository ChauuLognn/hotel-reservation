spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3308/hotel_reservation_premium?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok&zeroDateTimeBehavior=convertToNull}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1011}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    hibernate.naming:
      physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

  sql:
    init:
      mode: never

logging:
  level:
    org.springframework.security: DEBUG
    com.hotelreservation: DEBUG

# Development-specific settings
app:
  data-seeding:
    enabled: true

